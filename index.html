        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Package for You!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 20px; text-align: center; max-width: 500px; width: 90%; }
        .media-box { width: 100%; height: 280px; object-fit: cover; border-radius: 10px; background: #eee; }
        .hidden { display: none; }
        button { padding: 15px 30px; cursor: pointer; border-radius: 10px; border: none; background: #2196F3; color: white; font-weight: bold; }
    </style>
</head>
<body>

<!-- فایل‌های صوتی -->
<audio id="knockSound" loop><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-84.mp3" type="audio/mp3"></audio>
<audio id="doorOpenSound"><source src="https://assets.mixkit.co/active_storage/sfx/276/276-84.mp3" type="audio/mp3"></audio>

<div class="container" id="card">
    <div id="step0">
        <img src="door.png" class="media-box">
        <h2>Someone is knocking...</h2>
        <button onclick="startExperience()">Open the Door 🚪</button>
    </div>

    <div id="step1" class="hidden">
        <video id="vid1" class="media-box" playsinline>
            <source src="postman_name.mp4" type="video/mp4">
        </video>
        <h2>Are you Saman?</h2>
        <button onclick="nextStep(1, 2)">Yes</button>
        <button onclick="wrongAnswer()">No</button>
    </div>

    <div id="step2" class="hidden">
        <video id="vid2" class="media-box" playsinline>
            <source src="postman_lastname.mp4" type="video/mp4">
        </video>
        <h2>Is your last name Yaseri?</h2>
        <button onclick="nextStep(2, 3)">Yes</button>
    </div>
    
    <div id="step3" class="hidden">
        <video id="vid3" class="media-box" playsinline onclick="openGift()">
            <source src="postman_delivery.mp4" type="video/mp4">
        </video>
        <h2>Click the video to get your gift!</h2>
    </div>

    <div id="step4" class="hidden">
        <img src="surprise.png" class="media-box">
        <h2>Happy Birthday! 🎂</h2>
    </div>
</div>

<script>
    function startExperience() {
        document.getElementById('knockSound').play(); // شروع صدا
        document.getElementById('doorOpenSound').play();
        document.getElementById('step0').classList.add('hidden');
        document.getElementById('step1').classList.remove('hidden');
        document.getElementById('vid1').play(); // پخش ویدیو با صدا
    }

    function nextStep(current, next) {
        document.getElementById('step'+current).classList.add('hidden');
        document.getElementById('step'+next).classList.remove('hidden');
        const v = document.getElementById('vid'+next);
        if(v) v.play();
    }

    function wrongAnswer() {
        const v = document.getElementById('vid1');
        v.src = "postman_suspicious.mp4"; // تغییر ویدیو به مچ‌گیری
        v.play();
    }

    function openGift() {
        confetti();
        document.getElementById('step3').classList.add('hidden');
        document.getElementById('step4').classList.remove('hidden');
    }
</script>

</body>
</html>
