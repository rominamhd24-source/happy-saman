        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Package for You!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.12); 
            text-align: center; 
            max-width: 500px; 
            width: 90%; 
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 2;
        }
        @keyframes popUp {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .media-box { 
            width: 100%; 
            height: 280px; 
            object-fit: cover; 
            border-radius: 12px; 
            background: #eee; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        
        /* استایل مخصوص تمام‌صفحه شدن ویدیوی عمودی آخر */
        .fullscreen-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* برای اینکه ویدیوی عمودی دفرمه نشود اما تمام صفحه را بگیرد */
            background: black;
            z-index: 9999;
        }
        .fullscreen-text {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            z-index: 10000;
            font-size: 26px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            font-weight: bold;
            text-align: center;
            width: 100%;
        }

        h2 { color: #333; margin: 20px 0; font-size: 20px; line-height: 1.4; min-height: 56px; }
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        button { 
            padding: 14px 30px; font-size: 16px; border: none; border-radius: 12px; 
            cursor: pointer; transition: all 0.2s ease; font-weight: bold; 
        }
        .btn-yes { background: linear-gradient(135deg, #4CAF50, #45a049); color: white; box-shadow: 0 4px 15px rgba(76,175,80,0.3); }
        .btn-yes:hover { transform: translateY(-2px); }
        .btn-no { background: linear-gradient(135deg, #f44336, #da190b); color: white; box-shadow: 0 4px 15px rgba(244,67,54,0.3); }
        .btn-no:hover { transform: translateY(-2px); }
        .btn-door { background: linear-gradient(135deg, #2196F3, #1976D2); color: white; box-shadow: 0 4px 15px rgba(33,150,243,0.3); width: 100%; }
        .btn-door:hover { transform: scale(1.03); }
        .hidden { display: none; }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

<audio id="knockSound" loop><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-84.mp3" type="audio/mp3"></audio>
<audio id="doorOpenSound"><source src="https://assets.mixkit.co/active_storage/sfx/276/276-84.mp3" type="audio/mp3"></audio>
<audio id="birthdayMusic" loop><source src="https://scummbar.com/mi2/MI1-CD/01%20-%20Opening%20Themes%20-%20Introduction.mp3" type="audio/mp3"></audio>

<div class="container" id="welcomeStep">
    <h2>You have a pending delivery! 📦</h2>
    <p style="color: #666; margin-bottom: 20px;">Please click below to check your front door.</p>
    <button class="btn-door" onclick="unlockAudio()">Enter Site 🔓</button>
</div>

<div class="container hidden" id="card">
    <div id="step0">
        <img src="door.png" class="media-box" alt="Wooden Door">
        <h2>Someone is knocking on your screen... ✊🚪</h2>
        <button class="btn-door" onclick="startExperience()">Open the Door 🚪</button>
    </div>

    <div id="step1" class="hidden">
        <video id="vid1" class="media-box" playsinline>
            <source src="postman_name.mp4" type="video/mp4">
        </video>
        <h2 id="text1">Hi there! Are you Saman?</h2>
        <div class="btn-group">
            <button class="btn-yes" onclick="nextStep(1, 2)">Yes</button>
            <button class="btn-no" onclick="wrongAnswer()">No</button>
        </div>
    </div>

    <div id="step2" class="hidden">
        <video id="vid2" class="media-box" playsinline>
            <source src="postman_lastname.mp4" type="video/mp4">
        </video>
        <h2>And your last name is Yaseri, right?</h2>
        <div class="btn-group">
            <button class="btn-yes" onclick="nextStep(2, 3)">Yes</button>
        </div>
    </div>
    
    <div id="step3" class="hidden">
        <video id="vid3" class="media-box" playsinline style="cursor: pointer;" onclick="openGift()">
            <source src="postman_delivery.mp4" type="video/mp4">
        </video>
        <h2>Perfect! Here is your package. 📦<br><span style="font-size: 14px; color:#666; font-weight: normal;">Click the video to open!</span></h2>
    </div>
</div>

<div id="step4" class="hidden">
    <video id="vid4" class="fullscreen-video" playsinline>
        <source src="surprise_comedy.mp4" type="video/mp4">
    </video>
    <div class="fullscreen-text">Happy Birthday, my dearest! 🎂✨</div>
</div>

<script>
    // قدم اول: شکستن قفل صدا و شروع افکت در زدن
    function unlockAudio() {
        document.getElementById('welcomeStep').classList.add('hidden');
        document.getElementById('card').classList.remove('hidden');
        
        const knock = document.getElementById('knockSound');
        knock.play().catch(e => console.log("Audio play blocked"));
    }

    function startExperience() {
        // قطع صدای در زدن و پخش صدای باز شدن در واقعی
        document.getElementById('knockSound').pause(); 
        document.getElementById('doorOpenSound').play();
        
        setTimeout(() => {
            document.getElementById('step0').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('vid1').play(); 
        }, 600); 
    }

    function nextStep(current, next) {
        const currentVid = document.getElementById('vid' + current);
        if(currentVid) currentVid.pause();

        document.getElementById('step' + current).classList.add('hidden');
        document.getElementById('step' + next).classList.remove('hidden');
        
        const nextVid = document.getElementById('vid' + next);
        if(nextVid) nextVid.play();
        
        document.getElementById('card').classList.remove('shake');
    }

    function wrongAnswer() {
        const card = document.getElementById('card');
        card.classList.add('shake');
        
        const v1 = document.getElementById('vid1');
        v1.src = "postman_suspicious.mp4";
        v1.play();
        
        const h2 = document.getElementById('text1');
        h2.innerHTML = "Don't lie to me! 🕵️‍♂️ Click YES.";
        h2.style.color = '#d32f2f';
        
        setTimeout(() => { card.classList.remove('shake'); }, 500);
    }

    function openGift() {
        // پخش همزمان موزیک تولد در پس‌زمینه با صدای ملایم‌تر
        const bdayMusic = document.getElementById('birthdayMusic');
        bdayMusic.volume = 0.4; // تنظیم ولوم روی ۴۰ درصد که صدای ویدیو واضح بماند
        bdayMusic.play().catch(e => console.log(e));

        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });

        setTimeout(() => {
            document.getElementById('card').classList.add('hidden'); // مخفی کردن کل کارت سفید
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');
            
            const finalVid = document.getElementById('vid4');
            finalVid.play(); // پخش ویدیوی کمدی نهایی با صدای خودش
            
            // افکت جشن مداوم
            var duration = 6 * 1000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }, 300);
    }
</script>

</body>
</html>
