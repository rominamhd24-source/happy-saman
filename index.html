<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Package for You!</title>
    <!-- اضافه کردن کتابخانه کاغذ رنگی برای قشنگ شدن -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: white;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popUp {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }
        h2 { color: #333; margin-bottom: 20px; font-size: 22px; line-height: 1.4; }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }
        button {
            padding: 14px 30px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }
        .btn-yes { background: linear-gradient(135deg, #4CAF50, #45a049); color: white; box-shadow: 0 4px 15px rgba(76,175,80,0.3); }
        .btn-yes:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76,175,80,0.4); }
        .btn-no { background: linear-gradient(135deg, #f44336, #da190b); color: white; box-shadow: 0 4px 15px rgba(244,67,54,0.3); }
        .btn-no:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(244,67,54,0.4); }
        .hidden { display: none; }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        video, .final-img {
            width: 100%;
            border-radius: 12px;
            margin-top: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

<!-- فایل صوتی تولد (آهنگ بی‌کلام ملایم یا شاد تولد) -->
<audio id="birthdayMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<div class="container" id="card">
    <!-- مرحله اول -->
    <div id="step1">
        <img src="postman1.png" alt="Postman">
        <h2>Hi there! Are you Saman?</h2>
        <div class="btn-group">
            <button class="btn-yes" onclick="nextStep(2)">Yes</button>
            <button class="btn-no" onclick="wrongAnswer(1)">No</button>
        </div>
    </div>

    <!-- مرحله دوم -->
    <div id="step2" class="hidden">
        <img src="postman1.png" alt="Postman">
        <h2>And your last name is Yaseri, right?</h2>
        <div class="btn-group">
            <button class="btn-yes" onclick="nextStep(3)">Yes</button>
            <button class="btn-no" onclick="wrongAnswer(2)">No</button>
        </div>
    </div>

    <!-- مرحله سوم (جعبه کادو) -->
    <div id="step3" class="hidden">
        <img src="box.png" alt="Gift Box" style="cursor: pointer; transition: transform 0.3s; width: 180px;" onclick="openGift()" id="giftBox">
        <h2>Perfect! You have a package. 📦<br><span style="font-size: 15px; color:#666; font-weight: normal;">Click the box to open!</span></h2>
    </div>

    <!-- مرحله آخر (سورپرایز) -->
    <div id="step4" class="hidden">
        <img src="surprise.png" class="final-img" alt="Surprise">
        <h2 style="color: #e91e63; margin-top: 25px; font-size: 24px; font-weight: bold;">Happy Birthday, my dearest! 🎂✨</h2>
    </div>
</div>

<script>
    function nextStep(step) {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.add('hidden');
        
        document.getElementById('step' + step).classList.remove('hidden');
        document.getElementById('card').classList.remove('shake');
    }

    function wrongAnswer(currentStep) {
        const card = document.getElementById('card');
        card.classList.add('shake');
        
        const h2 = document.querySelector('#step' + currentStep + ' h2');
        h2.innerHTML = "Don't lie to me! 🕵️‍♂️ Click YES.";
        h2.style.color = '#d32f2f';
        
        setTimeout(() => { card.classList.remove('shake'); }, 500);
    }

    function openGift() {
        const box = document.getElementById('giftBox');
        const music = document.getElementById('birthdayMusic');
        
        // ۱. پخش موزیک
        music.play().catch(error => console.log("Audio play blocked"));

        // ۲. افکت انیمیشن جعبه
        box.style.transform = 'scale(1.3) rotate(10deg)';
        
        // ۳. افکت انفجار کاغذ رنگی خفن
        confetti({
            particleCount: 150,
            spread: 80,
            origin: { y: 0.6 }
        });

        // ۴. رفتن به مرحله بعد
        setTimeout(() => {
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');
            
            // رقص مداوم کاغذ رنگی برای ۵ ثانیه در مرحله آخر
            var duration = 5 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }, 600);
    }
</script>

</body>
</html>
